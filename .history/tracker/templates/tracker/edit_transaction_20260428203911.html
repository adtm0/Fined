{% extends 'tracker/base.html' %}
    <h1>Edit Transaction</h1>
    <form method="POST">
      {% csrf_token %}
      {% if form.errors %}
        <p style="color:red;">{{ form.errors }}</p>
      {% endif %}
      {{ form.as_p }}
      <button type="submit">Save</button>
    </form>
    <a href="/wallet/{{ transaction.wallet.id }}/">Cancel</a>
  </body>
</html>
