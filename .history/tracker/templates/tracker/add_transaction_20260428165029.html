<!DOCTYPE html>
<html>
  <head>
    <title>Add Transaction</title>
  </head>
  <body>
    <h1>Add Transaction to {{ wallet.name }}</h1>
    <form method="POST">
      {% csrf_token %}
      {% if form.errors %}
        <p style="color:red;">{{ form.errors }}</p>
      {% endif %}
      {{ form.as_p }}
      <button type="submit">Add Transaction</button>
    </form>
  </body>
</html>
