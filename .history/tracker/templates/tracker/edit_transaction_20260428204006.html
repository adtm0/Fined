{% extends 'tracker/base.html' %}

{% block content %}
<h1 class="mb-4">Edit Transaction</h1>
<form method="POST" class="w-50">
  {% csrf_token %}
  {% if form.errors %}
    <div class="alert alert-danger">{{ form.errors }}</p>
  {% endif %}
  {{ form.as_p }}
  <button type="submit">Save</button>
</form>
<a href="/wallet/{{ transaction.wallet.id }}/">Cancel</a>
