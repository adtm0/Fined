{% extends 'tracker/base.html' %}

{% block content %}
<h1 class="mb-4">Add Transaction to {{ wallet.name }}</h1>
<form method="POST">
  {% csrf_token %}
  {% if form.errors %}
    <p style="color:red;">{{ form.errors }}</p>
  {% endif %}
  {{ form.as_p }}
  <button type="submit">Add Transaction</button>
</form>
<a href="/dashboard/">Cancel</a>
  </body>
</html>
