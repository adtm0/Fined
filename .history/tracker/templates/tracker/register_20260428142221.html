<!DOCTYPE html>
<html>
  <head>
    <title>register</title>
  </head>
  <body>
    <h1>Register</h1>
    <form method="POST">
      {% csrf_token %}
      {%if form.errors%}
        <p style="color:red;">{}</p>
      {{form.as_p}}
      <button type="submit">Create Account</button>
    </form>
    <a href="/login">Already have an account? Login in</a>
  </body>
</html>
