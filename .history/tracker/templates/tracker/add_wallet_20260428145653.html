<!DOCTYPE html>
<html>
  <head>
    <title>Add Wallet</title>
  </head>
  <body>
    <h1>Add Wallet</h1>
    <form method="POST">
      {% {% csrf_token %}
    </form>
    {% if wallets %}
      {% for wallet in wallets %}
        <p>{{ wallet.name }} = {{ wallet.balance }}</p>
      {% endfor %}
      {% else %}
        <p>No wallets yet.</p>
      {% endif %}

      <a href="/wallet/add/">Add Wallet</a>
  </body>
</html>
