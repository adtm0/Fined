<!DOCTYPE html>
<html>
  <head>
    <title>Edit Transaction</title>
  </head>
  <body>
    <h1>Edit Transaction</h1>

      {% csrf_token %}

    {% if transactions %}

    {% else %}
      <p>No trnsactions yet.</p>
    {% endif %}
  </body>
</html>
