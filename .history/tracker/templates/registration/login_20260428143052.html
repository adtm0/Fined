<!DOCTYPE html>
<html>
  <head>
    <title>Login</title>
  </head>
  <body>
    <h1>Login</h1>
    <form method="POST">
      {% csrf_token %}
      {%if form.errors%}
        <p style="color:red;">{{ form.errors }}</p>
      {% endif %}
      {{form.as_p}}
      <button type="submit">Create Account</button>
    </form>
  </body>
</html>
